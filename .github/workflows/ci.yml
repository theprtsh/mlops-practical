name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pytest httpx

    - name: Prepare data and models
      run: |
        python data.py
        python train.py

    - name: Run tests
      run: |
        pytest tests/

    - name: Build Docker Image
      run: |
        docker build -t iris-ab-api .
